<!DOCTYPE html>
<html>
<head>

<title>Perfume Store Test</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#f4f4f4;
margin:0;
}

header{
background:black;
color:white;
text-align:center;
padding:20px;
}

.cartbtn{
position:fixed;
right:20px;
top:20px;
background:#25D366;
color:white;
padding:10px;
border:none;
cursor:pointer;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:20px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
text-align:center;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

button{
padding:10px;
border:none;
background:black;
color:white;
cursor:pointer;
margin-top:10px;
}

</style>

</head>

<body>

<header>

Perfume Store Test Mode

</header>

<button class="cartbtn" onclick="viewCart()">🛒 View Cart</button>

<div class="products">

<div class="card">

<img src="https://i.ibb.co/4pDNDk1/perfume.jpg">

<h3>Lattafa Yara Candy</h3>

<p>450 MXN</p>

<button onclick="addToCart('Lattafa Yara Candy',450)">

Add to Cart

</button>

</div>

<div class="card">

<img src="https://i.ibb.co/fdX70xMX/viedo-chick.png">

<h3>Yara Pink</h3>

<p>500 MXN</p>

<button onclick="addToCart('Yara Pink',500)">

Add to Cart

</button>

</div>

</div>

<script>

let cart=[];

function addToCart(name,price){

cart.push({name,price});

alert(name+" added to cart");

}

function viewCart(){

let message="Perfume Order:%0A";

cart.forEach(item=>{

message+=item.name+" - "+item.price+" MXN%0A";

});

window.open("https://wa.me/524421311997?text="+message);

}

</script>

</body>

</html>
