<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Indian Perfume Store</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

header{
background:black;
color:white;
padding:20px;
text-align:center;
font-size:28px;
}

.search{
text-align:center;
padding:15px;
background:white;
}

.search input{
padding:10px;
width:60%;
font-size:16px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:20px;
}

.card{
background:white;
border-radius:10px;
padding:15px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
text-align:center;
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.price{
color:green;
font-weight:bold;
}

button{
padding:10px;
border:none;
margin:5px;
cursor:pointer;
}

.email{
background:black;
color:white;
}

.whatsapp{
background:#25D366;
color:white;
}

</style>

<script>

function searchProduct(){

let input=document.getElementById("search").value.toLowerCase()

let cards=document.getElementsByClassName("card")

for(let i=0;i<cards.length;i++){

let title=cards[i].innerText.toLowerCase()

if(title.includes(input))
cards[i].style.display="block"

else
cards[i].style.display="none"

}

}

</script>

</head>

<body>

<header>

Indian Perfume Store

</header>

<div class="search">

<input id="search" onkeyup="searchProduct()" placeholder="Search perfume...">

</div>

<div class="products">

<div class="card">

<img src="https://i.ibb.co/fdX70xMX/viedo-chick.png">

<h3>Lattafa Yara Candy</h3>

<p class="price">450 MXN</p>

<a href="mailto:bgabru@email.com?subject=Perfume Order">

<button class="email">Email Order</button>

</a>

<a href="https://wa.me/524613247039">

<button class="whatsapp">WhatsApp Order</button>

</a>

</div>


<div class="card">

<img src="https://i.ibb.co/4pDNDk1/perfume.jpg">

<h3>Lattafa Asad</h3>

<p class="price">520 MXN</p>

<a href="mailto:bgabru@email.com?subject=Perfume Order">

<button class="email">Email Order</button>

</a>

<a href="https://wa.me/524613247039">

<button class="whatsapp">WhatsApp Order</button>

</a>

</div>


<div class="card">

<img src="https://i.ibb.co/4pDNDk1/perfume.jpg">

<h3>Lattafa Khamrah</h3>

<p class="price">680 MXN</p>

<a href="mailto:your@email.com?subject=Perfume Order">

<button class="email">Email Order</button>

</a>

<a href="https://wa.me/4613247039">

<button class="whatsapp">WhatsApp Order</button>

</a>

</div>


</div>

</body>

</html>
