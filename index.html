<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Perfume Árabe Original Importación</title>

<style>

body{
font-family:Arial;
margin:0;
background:#0a1f44;
color:white;
}

header{
background:#0d2d63;
padding:20px;
text-align:center;
font-size:26px;
font-weight:bold;
}

.shipping{
background:#FFD700;
color:black;
text-align:center;
padding:12px;
font-weight:bold;
}

.products{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:20px;

}

.card{

background:#123b7a;
border-radius:10px;
padding:15px;
text-align:center;
box-shadow:0 5px 10px rgba(0,0,0,0.5);

}

.card img{

width:100%;
height:240px;
object-fit:cover;
border-radius:8px;

}

.price{

font-size:18px;
margin:10px 0;

}

button{

background:#25D366;
border:none;
padding:10px;
color:white;
cursor:pointer;
border-radius:6px;

}

input{

width:60px;
margin-top:5px;

}

.cartBtn{

position:fixed;
bottom:20px;
right:20px;
background:#25D366;
padding:16px;
border-radius:50px;
font-size:18px;

}

</style>

</head>

<body>

<header>

Perfume Árabe Original Importación

</header>

<div class="shipping">

Envío a todo México: $200 MXN

</div>

<div class="products">

<div class="card">

<img src="https://i.ibb.co/j9MJYQJB/YARA-BCO.jpg">

<h3>Yara Blanco</h3>

<input type="number" id="p1" value="1" min="1">

<br>

<button onclick="add('Yara Blanco',550,'p1')">Agregar</button>

</div>

<div class="card">

<img src="https://i.ibb.co/CKk5jN9v/YARA-ROJO.jpg">

<div class="price">$550 MXN</div>

<input type="number" id="p2" value="1" min="1">

<br>

<button onclick="add('Yara Rojo',550,'p2')">Agregar</button>

</div>

<div class="card">

<img src="https://i.ibb.co/KpQMsVHw/YARA-AMARILLO.jpg">

<h3>Yara Amarillo</h3>

<div class="price">$550 MXN</div>

<input type="number" id="p3" value="1" min="1">

<br>

<button onclick="add('Yara Amarillo',550,'p3')">Agregar</button>

</div>

<div class="card">

<img src="https://i.ibb.co/TqHpCQB0/YARA-CANDY.jpg">

<h3>Yara Candy</h3>

<div class="price">$550 MXN</div>

<input type="number" id="p4" value="1" min="1">

</div>

<h3>Yara Morado</h3>

<input type="number" id="p5" value="1" min="1">

<br>

<button onclick="add('Yara Morado',550,'p5')">Agregar</button>

</div>

<div class="card">

<img src="https://i.ibb.co/fGM3jxbX/asad-AZUL.jpg">

<h3>Asad Azul</h3>

<div class="price">$550 MXN</div>

<input type="number" id="p6" value="1" min="1">

<br>

<button onclick="add('Asad Azul',550,'p6')">Agregar</button>

</div>

<div class="card">

<button onclick="add('Asad Café',550,'p8')">Agregar</button>

</div>

</div>

<button class="cartBtn" onclick="order()">

Enviar Pedido WhatsApp

</button>

<script>

let cart=[]

function add(name,price,id){

let qty=parseInt(document.getElementById(id).value)

cart.push({name,price,qty})

alert("Producto agregado")

}

function order(){

if(cart.length==0){

alert("Carrito vacío")

return

}

let shipping=200

let subtotal=0

let msg="Hola quiero ordenar:%0A"

cart.forEach(p=>{

let total=p.price*p.qty

subtotal+=total

msg+=`${p.qty} x ${p.name} - ${total} MXN%0A`

})

let total=subtotal+shipping

msg+=`%0AEnvío: 200 MXN`
msg+=`%0ATotal: ${total} MXN`

window.open(`https://wa.me/524613247039?text=${msg}`)

}

</script>

</body>
