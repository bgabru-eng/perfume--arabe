<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Perfumes Árabes</title>

<style>

body{
font-family:Arial;
background:#0b0b0b;
color:white;
margin:0;
}

header{
background:#111;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
color:#d4af37;
font-size:24px;
font-weight:bold;
}

.cart{
cursor:pointer;
font-size:18px;
}

.shipping{
background:#d4af37;
color:black;
text-align:center;
padding:12px;
font-weight:bold;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#1a1a1a;
border:1px solid #d4af37;
border-radius:10px;
padding:15px;
text-align:center;
}

.card img{
width:100%;
height:240px;
object-fit:cover;
}

button{
background:#d4af37;
border:none;
padding:10px;
cursor:pointer;
margin-top:5px;
}

h2{
text-align:center;
color:#d4af37;
margin-top:40px;
}

.cartBox{
position:fixed;
right:-400px;
top:0;
width:350px;
height:100%;
background:#111;
padding:20px;
transition:0.4s;
overflow:auto;
}

.cartBox.active{
right:0;
}

.cartItem{
border-bottom:1px solid #333;
padding:10px 0;
}

.remove{
color:red;
cursor:pointer;
}

.checkout{
background:#25D366;
color:white;
width:100%;
padding:12px;
font-size:18px;
}

</style>
</head>

<body>

<header>

<div class="logo">Perfumes</div>

<div class="cart" onclick="toggleCart()">
🛒 Cart (<span id="cartCount">0</span>)
</div>

</header>

<div class="shipping">
Envío a todo México: $200 MXN
</div>

<h2>Perfumes</h2>

<div class="products">

<div class="card">

<img src="https://i.ibb.co/j9MJYQJB/YARA-BCO.jpg">

<h3>Yara Blanco</h3>

<p>550 MXN</p>

<input type="number" id="q1" value="1" min="1">

<button onclick="addCart('Yara Blanco',550,'q1')">Agregar</button>

</div>

<div class="card">

<img src="https://i.ibb.co/CKk5jN9v/YARA-ROJO.jpg">

<h3>Yara Rojo</h3>

<p>550 MXN</p>

<input type="number" id="q2" value="1" min="1">

<button onclick="addCart('Yara Rojo',550,'q2')">Agregar</button>

</div>

<div class="card">

<img src="https://i.ibb.co/KpQMsVHw/YARA-AMARILLO.jpg">

<h3>Yara Amarillo</h3>

<p>550 MXN</p>

<input type="number" id="q3" value="1" min="1">

<button onclick="addCart('Yara Amarillo',550,'q3')">Agregar</button>

</div>

</div>

<h2>Incienso Natural</h2>

<div class="products">

<div class="card">

<img src="https://i.ibb.co/fGM3jxbX/asad-AZUL.jpg">

<h3>Asad Azul</h3>

<p>550 MXN</p>

<input type="number" id="q4" value="1" min="1">

<button onclick="addCart('Asad Azul',600,'q4')">Agregar</button>

</div>

<div class="card">

<img src="https://i.ibb.co/rKRmhgwD/ASAD-NEGRO.jpg">

<h3>Asad Negro</h3>

<p>550 MXN</p>

<input type="number" id="q5" value="1" min="1">

<button onclick="addCart('Asad Negro',550,'q5')">Agregar</button>

</div>

</div>

<div class="cartBox" id="cartBox">

<h2>Carrito</h2>

<div id="cartItems"></div>

<br>

<button class="checkout" onclick="sendOrder()">Enviar Pedido WhatsApp</button>

</div>

<script>

let cart=[];

function toggleCart(){

document.getElementById("cartBox").classList.toggle("active")

}

function addCart(name,price,id){

let qty=parseInt(document.getElementById(id).value)

cart.push({name,price,qty})

updateCart()

}

function updateCart(){

let box=document.getElementById("cartItems")

box.innerHTML=""

let count=0

cart.forEach((item,i)=>{

count++

box.innerHTML+=`
<div class="cartItem">
${item.qty} x ${item.name} - ${item.price*item.qty} MXN
<br>
<span class="remove" onclick="removeItem(${i})">Eliminar</span>
</div>
`

})

document.getElementById("cartCount").innerText=count

}

function removeItem(i){

cart.splice(i,1)

updateCart()

}

function sendOrder(){

if(cart.length==0){

alert("Carrito vacío")

return

}

let shipping=200

let subtotal=0

let msg="Hola quiero ordenar:%0A"

cart.forEach(item=>{

let total=item.price*item.qty

subtotal+=total

msg+=`${item.qty} x ${item.name} - ${total} MXN%0A`

})

let total=subtotal+shipping

msg+=`%0AEnvío: ${shipping} MXN`
msg+=`%0ATotal: ${total} MXN`

let number="524613247039"

window.open(`https://wa.me/${number}?text=${msg}`)

}

</script>

</body>
</html>
